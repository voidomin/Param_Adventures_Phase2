# SonarCloud Project Configuration
# https://docs.sonarcloud.io/advanced-setup/analysis-parameters/

# Project metadata
sonar.projectKey=voidomin_Param_Adventures_Phase2
sonar.organization=voidomin

# Exclusions
# We ignore these folders because they contain external reference materials,
# generated documents, or auxiliary data not part of the core source code.
sonar.exclusions=skills/**, reference/**, .next/**, node_modules/**, public/**, docs/**, tsc-error.txt, build_output.log

# Scope
sonar.sources=src, prisma
sonar.typescript.tsconfigPath=tsconfig.json

# Test exclusions
sonar.test.exclusions=**/*.test.ts, **/*.test.tsx, **/*.spec.ts, **/*.spec.tsx
