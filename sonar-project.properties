# SonarCloud Automatic Analysis Configuration
# https://docs.sonarcloud.io/advanced-setup/automatic-analysis/

# Project metadata (Required for some environments, optional for Automatic Analysis)
sonar.projectKey=voidomin_Param_Adventures_Phase2
sonar.organization=voidomin

# Global Exclusions - Keep generated/vendor/docs out of source analysis
sonar.exclusions=**/skills/**,**/reference/**,**/.next/**,**/node_modules/**,**/public/**,**/docs/**,tsc-error.txt,build_output.log,**/.gemini/**,**/tmp/**,src/**/__tests__/**,src/**/*.test.ts,src/**/*.test.tsx,src/**/*.spec.ts,src/**/*.spec.tsx

# Source Scope
sonar.sources=src

# Test Scope
sonar.tests=src/__tests__
sonar.test.inclusions=src/**/__tests__/**,src/**/*.test.ts,src/**/*.test.tsx,src/**/*.spec.ts,src/**/*.spec.tsx

# Coverage exclusions (tests should never count toward uncovered source)
sonar.coverage.exclusions=src/**/*.test.ts,src/**/*.test.tsx,src/**/*.spec.ts,src/**/*.spec.tsx,src/**/__tests__/**


# Coverage reporting paths (requires CI-based analysis, not Automatic Analysis)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
