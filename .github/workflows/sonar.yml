name: CI & Quality Analysis

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "0 0 * * 0" # Weekly at midnight on Sunday
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@d632683dd7b4114ad3ca9ae40b9e4acc13eab4c5 # v4.2.1
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@1345a757486c0d30be6d0260d7b6355dd1f5a4c9 # v4.0.4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run lint
        run: npm run lint

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@d632683dd7b4114ad3ca9ae40b9e4acc13eab4c5 # v4.2.1

      - name: Setup Node.js
        uses: actions/setup-node@1345a757486c0d30be6d0260d7b6355dd1f5a4c9 # v4.0.4
        with:
          node-version: 24
          cache: "npm"

      - name: Production Security Audit
        if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
        run: npm audit --omit=dev --audit-level=high

      - name: Full Security Audit
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: npm audit --audit-level=high

  test:
    name: Test Suite
    needs: [lint, security-audit]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@d632683dd7b4114ad3ca9ae40b9e4acc13eab4c5 # v4.2.1
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@1345a757486c0d30be6d0260d7b6355dd1f5a4c9 # v4.0.4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run tests with Coverage
        run: npm run test:coverage

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@1159379685957d65377ad5a8a6136be497f19114 # v4.3.1
        with:
          name: coverage-report
          path: coverage/
          retention-days: 1

  build:
    name: Build Verification
    needs: [lint, security-audit]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@d632683dd7b4114ad3ca9ae40b9e4acc13eab4c5 # v4.2.1
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@1345a757486c0d30be6d0260d7b6355dd1f5a4c9 # v4.0.4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/postgres' }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  sonarcloud:
    name: SonarCloud Analysis
    needs: [test, build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@d632683dd7b4114ad3ca9ae40b9e4acc13eab4c5 # v4.2.1
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@1345a757486c0d30be6d0260d7b6355dd1f5a4c9 # v4.0.4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Download Coverage Artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc06a967 # v4.1.7
        with:
          name: coverage-report
          path: coverage/

      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@2f77a1eb1d72c5780eb176e73715d97d43ef1017 # v5.3.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=voidomin_Param_Adventures_Phase2
            -Dsonar.organization=voidomin
            -Dsonar.sources=src
            -Dsonar.tests=src/__tests__
            -Dsonar.test.inclusions=src/**/__tests__/**,src/**/*.test.ts,src/**/*.test.tsx,src/**/*.spec.ts,src/**/*.spec.tsx
            -Dsonar.exclusions=**/skills/**,**/reference/**,**/.next/**,**/node_modules/**,**/public/**,**/docs/**,tsc-error.txt,build_output.log,**/.gemini/**,**/tmp/**,src/**/__tests__/**,src/**/*.test.ts,src/**/*.test.tsx,src/**/*.spec.ts,src/**/*.spec.tsx
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true
