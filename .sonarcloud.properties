# SonarCloud Automatic Analysis Configuration
# https://docs.sonarcloud.io/advanced-setup/automatic-analysis/

# Project metadata (Required for some environments, optional for Automatic Analysis)
sonar.projectKey=voidomin_Param_Adventures_Phase2
sonar.organization=voidomin

# Global Exclusions - This is the most aggressive way to ignore folders
# Use double asterisks to ensure subfolders are caught regardless of root depth
sonar.exclusions=**/skills/**, **/reference/**, **/.next/**, **/node_modules/**, **/public/**, **/docs/**, tsc-error.txt, build_output.log, **/.gemini/**, **/tmp/**

# Source Scope
# Explicitly defining sources helps narrow down what Sonar looks at
sonar.sources=src, prisma

# Test exclusions
sonar.test.exclusions=**/*.test.ts, **/*.test.tsx, **/*.spec.ts, **/*.spec.tsx
