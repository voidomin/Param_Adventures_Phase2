services:
  - type: web
    name: param-adventure
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm ci && npx prisma generate && npm run build
    preDeployCommand: npm run db:migrate:deploy
    startCommand: npm run start
    envVars:
      - key: NODE_OPTIONS
        value: --max-old-space-size=400
